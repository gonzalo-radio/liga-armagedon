{% extends "base.html" %}

{% block scripts %}
  {{ super() }}
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var badge = document.createElement('span');
      badge.className = 'md-version-badge';
      badge.textContent = '{{ config.extra.version }}';
      document.querySelector('.md-header__inner').appendChild(badge);
    });
  </script>
{% endblock %}
